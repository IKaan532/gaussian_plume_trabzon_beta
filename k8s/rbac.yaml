apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-sa
  namespace: gitea-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: gaussian-plume
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-deployer
  namespace: gaussian-plume
subjects:
  - kind: ServiceAccount
    name: runner-sa
    namespace: gitea-runner
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io
